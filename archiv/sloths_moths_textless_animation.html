<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sloths & Moths – Textless Animated Cycle</title>
<style>
  :root{
    --ink:#263145;
    --branch:#2f394c;
    --branch2:#475166;
    --fur:#caba93;
    --fur2:#aa956d;
    --dark:#141923;
    --cream:#fffaf0;
    --moss:#8db443;
    --moss2:#c6df67;
    --leaf:#587b2c;
    --gold:#d7bf45;
    --dung:#2b2521;
    --nutrient:#a7c45a;
    --sky:#f5f7fb;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#fdfdfb 0%,#f5f7f1 62%,#eef5e4 100%);overflow:hidden;font-family:system-ui,Segoe UI,Arial,sans-serif;color:var(--ink)}
  .stage{width:100vw;height:100vh;display:grid;place-items:center;position:relative;isolation:isolate}
  .frame{width:min(100vw,177.78vh);height:min(56.25vw,100vh);position:relative;overflow:hidden;background:
      radial-gradient(circle at 50% 45%,rgba(255,255,255,.95) 0 33%,rgba(237,241,236,.72) 34% 58%,rgba(255,255,255,.0) 59%),
      linear-gradient(180deg,#ffffff 0%,#fbfcf8 100%);box-shadow:0 25px 80px rgba(32,42,55,.16)}
  svg{width:100%;height:100%;display:block}

  /* ambient */
  .cycle-ring{transform-origin:800px 520px;animation:slowSpin 32s linear infinite;opacity:.55}
  .cycle-soft{transform-origin:800px 520px;animation:slowSpinReverse 48s linear infinite;opacity:.22}
  .pulse-arrow{animation:arrowPulse 2.7s ease-in-out infinite;filter:url(#softShadow)}
  .pulse-arrow:nth-of-type(2){animation-delay:.45s}.pulse-arrow:nth-of-type(3){animation-delay:.9s}.pulse-arrow:nth-of-type(4){animation-delay:1.35s}.pulse-arrow:nth-of-type(5){animation-delay:1.8s}
  .branch-main{filter:url(#softShadow)}
  .branch-tip{animation:branchSway 6s ease-in-out infinite;transform-origin:300px 220px}
  .branch-tip.r{animation-delay:-2s;transform-origin:1210px 220px}

  /* sloths */
  .sloth{filter:url(#inkShadow)}
  .sway-left{transform-origin:270px 250px;animation:slothSway 5.8s ease-in-out infinite}
  .sway-right{transform-origin:1160px 260px;animation:slothSway2 6.3s ease-in-out infinite}
  .sway-center{transform-origin:785px 660px;animation:slothClimb 7.5s ease-in-out infinite}
  .fur-line{fill:none;stroke:#121721;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
  .fur-detail{fill:none;stroke:#0e1116;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
  .mossPatch{fill:none;stroke:var(--moss);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;opacity:.82;animation:mossGlow 2.8s ease-in-out infinite}
  .mossPatch.thin{stroke-width:5}.mossBlob{fill:var(--moss2);opacity:.82;filter:url(#tinyGlow);animation:mossBlob 3.2s ease-in-out infinite}
  .face-patch{fill:#f5f3ea;stroke:#111722;stroke-width:2.6}.mask-patch{fill:#121721}.eye{fill:#05070a}.nose{fill:#0e1117}.claw{fill:none;stroke:#0a0d12;stroke-width:4.1;stroke-linecap:round}.mouth{fill:none;stroke:#111722;stroke-width:2.4;stroke-linecap:round}
  .blink{transform-origin:center;animation:blink 6s linear infinite}.blink.delay{animation-delay:2.1s}

  /* animals / particles */
  .moth{filter:url(#softShadow)}
  .moth .wing{fill:url(#wingGrad);stroke:#15191f;stroke-width:2.5}.moth .stripe{stroke:#15191f;stroke-width:2.2;stroke-linecap:round}.moth .body{fill:#5a451f;stroke:#14171b;stroke-width:2}.moth .antenna{fill:none;stroke:#15191f;stroke-width:1.7;stroke-linecap:round}
  .flutter{animation:flutter .24s ease-in-out infinite alternate;transform-origin:center}
  .tinyMoth{opacity:.95}.tinyMoth:nth-child(odd){animation:floaty 4s ease-in-out infinite}.tinyMoth:nth-child(even){animation:floaty2 5s ease-in-out infinite}
  .leaf{fill:url(#leafGrad);stroke:#31491b;stroke-width:2;filter:url(#softShadow)}
  .fallLeaf{transform-origin:center;animation:fall 5.8s linear infinite}.fallLeaf:nth-child(2){animation-delay:-1.1s}.fallLeaf:nth-child(3){animation-delay:-2.5s}.fallLeaf:nth-child(4){animation-delay:-3.8s}.fallLeaf:nth-child(5){animation-delay:-.3s}
  .algae-flake{fill:#a7d658;stroke:#58832a;stroke-width:1.6;filter:url(#tinyGlow);animation:flakeToMouth 4.2s ease-in-out infinite;transform-origin:1115px 380px}
  .nutrient{fill:var(--nutrient);opacity:.8;filter:url(#tinyGlow);animation:nutrientRise 3.2s ease-in-out infinite}.nutrient:nth-child(2){animation-delay:.5s}.nutrient:nth-child(3){animation-delay:1s}.nutrient:nth-child(4){animation-delay:1.45s}.nutrient:nth-child(5){animation-delay:2s}.nutrient:nth-child(6){animation-delay:2.45s}
  .microbe{fill:#b7df61;stroke:#7ca13b;stroke-width:2;filter:url(#softShadow);animation:microPulse 2.8s ease-in-out infinite;transform-origin:center}.microbe:nth-child(2){animation-delay:.4s}.microbe:nth-child(3){animation-delay:.8s}
  .micro-dot{fill:#e4f789;opacity:.9;animation:microDot 1.8s ease-in-out infinite}
  .larva{animation:wiggle 1.2s ease-in-out infinite;transform-origin:center}.larva:nth-child(2){animation-delay:.2s}.larva:nth-child(3){animation-delay:.4s}
  .pellet{fill:#211f22;stroke:#3d3633;stroke-width:2;filter:url(#softShadow);animation:poopPulse 3.4s ease-in-out infinite}.pellet:nth-child(odd){animation-delay:.35s}
  .seed-dot{fill:#cfe973;opacity:.7;animation:seedSpark 2.4s ease-in-out infinite}

  .moth-path{fill:none;stroke:none}
  .orbit-dot{fill:#6f5a35;opacity:.8;filter:url(#softShadow)}
  .scene-vignette{pointer-events:none;position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,transparent 0 68%,rgba(64,85,51,.06) 100%)}

  @keyframes slowSpin{to{transform:rotate(360deg)}}
  @keyframes slowSpinReverse{to{transform:rotate(-360deg)}}
  @keyframes arrowPulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.95;transform:scale(1.015)}}
  @keyframes branchSway{0%,100%{transform:rotate(0)}50%{transform:rotate(.9deg)}}
  @keyframes slothSway{0%,100%{transform:rotate(-1.6deg) translateY(0)}50%{transform:rotate(1.6deg) translateY(5px)}}
  @keyframes slothSway2{0%,100%{transform:rotate(1deg) translateY(0)}50%{transform:rotate(-1.2deg) translateY(5px)}}
  @keyframes slothClimb{0%,100%{transform:translateY(0) rotate(-.7deg)}50%{transform:translateY(-12px) rotate(.9deg)}}
  @keyframes mossGlow{0%,100%{opacity:.56;stroke-width:6}50%{opacity:1;stroke-width:9}}
  @keyframes mossBlob{0%,100%{transform:scale(.92);opacity:.58}50%{transform:scale(1.13);opacity:.95}}
  @keyframes blink{0%,4%,100%{transform:scaleY(1)}2%{transform:scaleY(.08)}}
  @keyframes flutter{0%{transform:scaleX(.72) rotate(-5deg)}100%{transform:scaleX(1.06) rotate(5deg)}}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(7deg)}}
  @keyframes floaty2{0%,100%{transform:translateY(0) rotate(4deg)}50%{transform:translateY(8px) rotate(-8deg)}}
  @keyframes fall{0%{transform:translate(0,-20px) rotate(0);opacity:0}8%{opacity:1}82%{opacity:1}100%{transform:translate(-85px,330px) rotate(270deg);opacity:0}}
  @keyframes flakeToMouth{0%,35%,100%{transform:translate(0,0) scale(.9);opacity:.95}70%{transform:translate(-52px,-29px) scale(.55);opacity:.25}}
  @keyframes nutrientRise{0%{transform:translate(0,54px) scale(.5);opacity:0}30%{opacity:.9}100%{transform:translate(0,-78px) scale(1.2);opacity:0}}
  @keyframes microPulse{0%,100%{transform:scale(.98);opacity:.88}50%{transform:scale(1.08);opacity:1}}
  @keyframes microDot{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(7deg) translateY(-2px)}}
  @keyframes poopPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes seedSpark{0%,100%{opacity:.18;transform:scale(.5)}50%{opacity:.9;transform:scale(1.15)}}

  @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important} animateMotion{display:none}}
</style>
</head>
<body>
<main class="stage" aria-label="Textlose animierte Darstellung der Symbiose zwischen Faultieren, Motten, Algen und Nährstoffen.">
  <div class="frame">
  <svg viewBox="0 0 1600 900" role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg">
    <title id="t">Faultiere und Motten – animierter Kreislauf ohne sichtbaren Text</title>
    <desc id="d">Drei Faultiere, Motten, Algen, Kot, Larven und Nährstoffblasen zeigen den Kreislauf aus Fell, Waldboden und Algenwachstum.</desc>
    <defs>
      <linearGradient id="furGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d8caa3"/><stop offset=".55" stop-color="#bca981"/><stop offset="1" stop-color="#9a8564"/></linearGradient>
      <linearGradient id="furGradDark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#beac82"/><stop offset="1" stop-color="#817256"/></linearGradient>
      <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2a3346"/><stop offset=".5" stop-color="#485267"/><stop offset="1" stop-color="#20283a"/></linearGradient>
      <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8fb548"/><stop offset=".55" stop-color="#5f842e"/><stop offset="1" stop-color="#31571d"/></linearGradient>
      <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0dd72"/><stop offset=".58" stop-color="#d8bd37"/><stop offset="1" stop-color="#9e7c18"/></linearGradient>
      <radialGradient id="spotGrad" cx="50%" cy="40%" r="70%"><stop offset="0" stop-color="#e9fc91"/><stop offset=".65" stop-color="#a9cf56"/><stop offset="1" stop-color="#688d2d"/></radialGradient>
      <radialGradient id="lensGrad" cx="42%" cy="38%" r="70%"><stop offset="0" stop-color="#627246"/><stop offset=".55" stop-color="#25301e"/><stop offset="1" stop-color="#12170f"/></radialGradient>
      <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#202835" flood-opacity=".20"/></filter>
      <filter id="inkShadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#10141a" flood-opacity=".14"/></filter>
      <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="furNoise" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="8" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="4"/></filter>
      <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="10" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L13,8 L2,14 Q6,8 2,2" fill="#c7ccd3"/></marker>
      <marker id="arrowHeadGreen" markerWidth="16" markerHeight="16" refX="10" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L13,8 L2,14 Q6,8 2,2" fill="#97b84a"/></marker>

      <symbol id="mothSymbol" viewBox="-42 -32 84 64">
        <g class="moth">
          <g class="flutter">
            <path class="wing" d="M-4,-3 C-35,-31 -49,-5 -25,16 C-14,25 -5,16 -4,-3Z"/>

          <circle cx="-2" cy="-8" r="2" fill="#090b0e"/><circle cx="2" cy="-8" r="2" fill="#090b0e"/>
        </g>
      </symbol>

      <symbol id="larvaSymbol" viewBox="-35 -16 70 32">
        <g class="larva">
          <ellipse cx="-22" cy="0" rx="12" ry="10" fill="#f0d855" stroke="#14171b" stroke-width="2"/>
          <ellipse cx="-8" cy="0" rx="13" ry="11" fill="#e3c43f" stroke="#14171b" stroke-width="2"/>
          <ellipse cx="8" cy="0" rx="13" ry="11" fill="#f0d855" stroke="#14171b" stroke-width="2"/>
          <ellipse cx="23" cy="0" rx="12" ry="10" fill="#d3ad25" stroke="#14171b" stroke-width="2"/>
          <path d="M-16,-9 L-14,9 M0,-11 L1,11 M16,-9 L17,8" stroke="#14171b" stroke-width="2.3"/>
          <circle cx="30" cy="-3" r="2" fill="#111"/>
        </g>
      </symbol>

      <symbol id="leafSymbol" viewBox="-26 -14 52 28">
        <path class="leaf" d="M-24,2 C-5,-18 16,-14 25,0 C9,14 -11,16 -24,2Z"/>
        <path d="M-19,3 C-2,0 12,-1 23,0" stroke="#d4e993" stroke-width="2" fill="none" stroke-linecap="round"/>
      </symbol>
    </defs>

    <!-- background cycle -->
    <g class="cycle-soft">
      <path d="M800 195 A325 325 0 1 1 555 735" fill="none" stroke="#d9dee5" stroke-width="96" stroke-linecap="round" marker-end="url(#arrowHead)"/>

    <!-- moth routes -->
    <path id="route1" class="moth-path" d="M285 385 C245 505 360 575 505 640 S650 750 600 805"/>
    <path id="route2" class="moth-path" d="M620 804 C510 705 620 605 760 590 S1050 555 1260 420"/>

    <path id="route4" class="moth-path" d="M595 795 C750 835 980 710 1088 610 S1234 496 1286 438"/>

    <!-- hanging sloth left -->
    <g class="sloth sway-left">
      <path class="claw" d="M199 252 q-12 -29 8 -43 M211 254 q-6 -35 18 -44 M225 254 q3 -33 24 -34"/>

      <path d="M208 242 C195 315 182 382 194 451 C206 509 259 513 287 464 C318 407 303 322 333 241" fill="url(#furGrad)" stroke="#111721" stroke-width="4" filter="url(#furNoise)"/>

      <path class="mossPatch" d="M446 377 C455 407 443 430 417 453"/><path class="mossPatch thin" d="M218 342 C229 372 226 404 211 435"/><path class="mossPatch thin" d="M370 475 C350 484 325 482 305 465"/>
      <path class="fur-detail" d="M207 315 q20 12 4 25 M201 382 q21 7 0 25 M467 348 q-24 8 -9 22 M447 439 q-27 2 -14 20 M317 478 q25 -7 38 7"/>

    <g class="sloth sway-center">
      <path class="claw" d="M698 545 q31 -7 39 23 M704 562 q31 -1 35 25 M704 579 q28 5 28 28"/>
      <path class="claw" d="M811 530 q-26 -17 -16 -45 M794 525 q-21 -25 -6 -49 M777 520 q-15 -25 -1 -42"/>
      <path d="M672 604 C698 548 767 522 831 570 C880 607 870 704 819 755 C761 814 658 789 645 700 C640 664 653 633 672 604Z" fill="url(#furGrad)" stroke="#111721" stroke-width="4" filter="url(#furNoise)"/>
      <path d="M764 549 C747 487 783 454 831 481 C859 498 862 544 839 589" fill="url(#furGradDark)" stroke="#111721" stroke-width="4" filter="url(#furNoise)"/>
      <path d="M671 690 C605 706 590 756 646 791 C699 819 741 770 733 718" fill="url(#furGrad)" stroke="#111721" stroke-width="4" filter="url(#furNoise)"/>
      <path d="M813 683 C868 708 881 766 827 796 C782 820 748 778 760 726" fill="url(#furGrad)" stroke="#111721" stroke-width="4" filter="url(#furNoise)"/>
