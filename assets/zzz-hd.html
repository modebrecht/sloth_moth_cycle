<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Sloth Animation - Resting on Branch</title>
    <style>
        :root {
            --jungle-dark: #0a1c11;
            --jungle-light: #163d27;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--jungle-dark);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        svg {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Ambient Animations */
        @keyframes sway {
            0% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
            100% { transform: rotate(-1.5deg); }
        }

        @keyframes breathe {
            0% { transform: scale(1, 1); }
            50% { transform: scale(1.02, 1.04) translate(-2px, -3px); }
            100% { transform: scale(1, 1); }
        }

        @keyframes firefly-flicker {
            0%, 100% { opacity: 0.2; transform: translateY(0) scale(1); }
            50% { opacity: 0.9; transform: translateY(-15px) scale(1.2); }
        }
        
        @keyframes zzz-float {
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            20% { opacity: 0.9; }
            80% { opacity: 0.7; }
            100% { opacity: 0; transform: translate(30px, -80px) scale(1.8); }
        }

        .swinging-group {
            transform-origin: 400px 50px;
            animation: sway 7s ease-in-out infinite;
        }

        .breathing-body {
            /* Pivot at the bottom center of the new body position */
            transform-origin: 430px 440px; 
            animation: breathe 4.5s ease-in-out infinite;
        }

        .firefly {
            animation: firefly-flicker 4s ease-in-out infinite alternate;
        }

        .zzz-text {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            font-weight: bold;
            fill: #ffffff;
            font-size: 26px;
            filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.8));
            opacity: 0;
        }

        /* Eye States */
        .eye-open { display: none; }
        .eye-closed { display: block; }
        
        /* JS Triggered Classes */
        .is-awake .eye-open { display: block; }
        .is-awake .eye-closed { display: none; }
        
        /* Blinking logic when awake */
        .is-blinking .eye-open { display: none !important; }
        .is-blinking .eye-closed { display: block !important; }
        
    </style>
</head>
<body>

    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" id="scene">
        <defs>
            <!-- Background Gradient -->
            <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%" fx="40%" fy="40%">
                <stop offset="0%" stop-color="#1c4731" />
                <stop offset="60%" stop-color="#0a1c11" />
                <stop offset="100%" stop-color="#050e08" />
            </radialGradient>

            <!-- Sloth Fur Gradients -->
            <linearGradient id="fur-dark" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#694b37" />
                <stop offset="100%" stop-color="#4a3222" />
            </linearGradient>
            
            <linearGradient id="fur-light" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#8b684f" />
                <stop offset="100%" stop-color="#694b37" />
            </linearGradient>

            <linearGradient id="face-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f4e0c8" />
                <stop offset="100%" stop-color="#d9be9e" />
            </linearGradient>
            
            <linearGradient id="branch-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#593f28" />
                <stop offset="40%" stop-color="#422e1c" />
                <stop offset="100%" stop-color="#2c1d10" />
            </linearGradient>

            <!-- Drop Shadow for depth -->
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.65"/>
            </filter>
            
            <filter id="light-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
            </filter>
        </defs>

        <!-- Background -->
        <rect width="800" height="600" fill="url(#bg-glow)" />

        <!-- Fireflies container -->
        <g id="fireflies"></g>

        <!-- Background Leaves/Vines holding the branch -->
        <path d="M 50 -20 Q 80 200 40 450 Q 10 550 30 650" stroke="#0e2918" stroke-width="15" fill="none" opacity="0.6"/>
        <path d="M 750 -10 Q 720 250 760 450 Q 790 550 740 650" stroke="#0e2918" stroke-width="20" fill="none" opacity="0.6"/>

        <!-- Main Animation Group -->
        <g class="swinging-group">
            
            <!-- LAYER 1: BACK LIMBS (Behind the branch) -->
            <!-- Back Leg (Right Leg) -->
            <path d="M 500 380 Q 550 460 520 520" stroke="url(#fur-dark)" stroke-width="34" stroke-linecap="round" fill="none"/>
            <!-- Back Leg Claws -->
            <path d="M 510 515 Q 505 525 515 530" stroke="#b0b0b0" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M 520 518 Q 515 528 525 533" stroke="#b0b0b0" stroke-width="3" fill="none" stroke-linecap="round"/>
            
            <!-- Back Arm (Right Arm) -->
            <path d="M 380 390 Q 430 440 410 500" stroke="url(#fur-dark)" stroke-width="32" stroke-linecap="round" fill="none"/>
            <!-- Back Arm Claws -->
            <path d="M 400 495 Q 395 505 405 510" stroke="#b0b0b0" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M 410 498 Q 405 508 415 513" stroke="#b0b0b0" stroke-width="3" fill="none" stroke-linecap="round"/>


            <!-- LAYER 2: THE BRANCH -->
            <path d="M -50 450 Q 200 460 400 450 T 850 430" stroke="url(#branch-gradient)" stroke-width="50" stroke-linecap="round" fill="none" filter="url(#shadow)"/>
            
            <!-- Branch details (moss/texture) -->
            <path d="M 50 435 Q 100 430 150 440" stroke="#4a6332" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M 500 435 Q 550 445 600 430" stroke="#4a6332" stroke-width="8" fill="none" stroke-linecap="round"/>
            
            <!-- Leaves attached behind sloth -->
            <path d="M 620 440 Q 650 390 680 430 Q 660 460 620 440" fill="#2d5236" filter="url(#shadow)"/>


            <!-- LAYER 3: BODY AND HEAD (Resting on top) -->
            <g id="sloth-character">
                
                <!-- Breathing Body Group -->
                <g class="breathing-body">
                    <!-- Main Body Oval -->
                    <ellipse cx="430" cy="385" rx="95" ry="60" fill="url(#fur-light)" filter="url(#shadow)"/>
                    <!-- Neck/Shoulder blend -->
                    <circle cx="360" cy="385" r="45" fill="url(#fur-light)" />
                </g>

                <!-- Head Group -->
                <g id="sloth-head">
                    <!-- Head Base -->
                    <circle cx="300" cy="390" r="50" fill="url(#fur-light)" filter="url(#shadow)"/>
                    
                    <!-- Face Mask (shifted slightly to look outward/down) -->
                    <circle cx="285" cy="400" r="38" fill="url(#face-gradient)" />
                    
                    <!-- Eye Patches -->
                    <!-- Left (on screen) -->
                    <path d="M 245 395 Q 260 380 275 390 Q 265 410 245 395 Z" fill="#3a2315" opacity="0.8"/>
                    <!-- Right (on screen) -->
                    <path d="M 275 395 Q 290 380 305 390 Q 295 410 275 395 Z" fill="#3a2315" opacity="0.8"/>

                    <!-- Nose -->
                    <ellipse cx="265" cy="410" rx="8" ry="6" fill="#111" />
                    <ellipse cx="262" cy="408" rx="2" ry="1.5" fill="#555" /> <!-- nose highlight -->

                    <!-- Mouth -->
                    <path d="M 255 420 Q 265 428 275 420" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>

                    <!-- EYES -->
                    <!-- Left Eye -->
                    <g class="eye-open">
                        <circle cx="258" cy="393" r="4.5" fill="#000" />
                        <circle cx="256" cy="391" r="1.5" fill="#fff" /> <!-- Catchlight -->
                    </g>
                    <g class="eye-closed">
                        <path d="M 252 393 Q 258 398 264 393" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </g>

                    <!-- Right Eye -->
                    <g class="eye-open">
                        <circle cx="288" cy="393" r="4.5" fill="#000" />
                        <circle cx="286" cy="391" r="1.5" fill="#fff" /> <!-- Catchlight -->
                    </g>
                    <g class="eye-closed">
                        <path d="M 282 393 Q 288 398 294 393" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </g>
                </g>

                <!-- LAYER 4: FRONT LIMBS (Draped over the front of the branch) -->
                <!-- Front Leg (Left Leg) -->
                <path d="M 460 400 Q 500 480 460 540" stroke="url(#fur-light)" stroke-width="36" stroke-linecap="round" fill="none" filter="url(#light-shadow)"/>
                <!-- Claws front leg -->
                <path d="M 450 535 Q 445 545 455 550" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 460 538 Q 455 548 465 553" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 470 535 Q 465 545 475 550" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>

                <!-- Front Arm (Left Arm) -->
                <path d="M 340 400 Q 380 470 340 530" stroke="url(#fur-light)" stroke-width="32" stroke-linecap="round" fill="none" filter="url(#light-shadow)"/>
                <!-- Claws front arm -->
                <path d="M 330 525 Q 325 535 335 540" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 340 528 Q 335 538 345 543" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 350 525 Q 345 535 355 540" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>

            </g> <!-- End Sloth Character -->
            
            <!-- Zzz Container (Positioned right near the nose) -->
            <g id="zzz-container" transform="translate(180, 360)"></g>

        </g> <!-- End Swinging Group -->
        
        <!-- Foreground framing leaves -->
        <path d="M -20 -20 Q 50 80 -10 180 Z" fill="#143621" filter="url(#shadow)"/>
        <path d="M 820 -20 Q 750 80 810 180 Z" fill="#143621" filter="url(#shadow)"/>
        <path d="M -20 620 Q 80 550 -10 450 Z" fill="#143621" filter="url(#shadow)"/>
        <path d="M 820 620 Q 720 520 810 420 Z" fill="#143621" filter="url(#shadow)"/>

    </svg>

    <script>
        const sloth = document.getElementById('sloth-character');
        const zzzContainer = document.getElementById('zzz-container');
        const firefliesContainer = document.getElementById('fireflies');

        let isAsleep = true;
        let blinkTimeout, stateTimeout, zzzInterval;

        const config = {
            sleepDuration: { min: 8000, max: 20000 }, 
            awakeDuration: { min: 4000, max: 12000 }, 
            blinkInterval: { min: 2000, max: 6000 },  
            blinkDuration: 150,                       
            zzzInterval: 2500                         
        };

        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        function createFireflies(count) {
            for (let i = 0; i < count; i++) {
                const firefly = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const cx = random(50, 750);
                const cy = random(50, 550);
                const r = random(1, 3) + (Math.random() * 0.5);
                const delay = random(0, 5000);
                const duration = random(3000, 6000);
                
                firefly.setAttribute("cx", cx);
                firefly.setAttribute("cy", cy);
                firefly.setAttribute("r", r);
                firefly.setAttribute("fill", "#e8e084");
                firefly.setAttribute("class", "firefly");
                firefly.style.animationDuration = `${duration}ms`;
                firefly.style.animationDelay = `${delay}ms`;
                firefly.style.filter = "drop-shadow(0px 0px 4px #e8e084)";
                
                firefliesContainer.appendChild(firefly);
            }
        }

        function spawnZzz() {
            if (!isAsleep) return;
            
            const z = document.createElementNS("http://www.w3.org/2000/svg", "text");
            z.textContent = "Z";
            z.setAttribute("class", "zzz-text");
            
            const offsetX = random(-15, 15);
            const offsetY = random(-10, 10);
            z.setAttribute("x", offsetX);
            z.setAttribute("y", offsetY);
            
            const animDuration = random(3500, 5000);
            z.style.animation = `zzz-float ${animDuration}ms ease-out forwards`;
            
            zzzContainer.appendChild(z);

            setTimeout(() => {
                if (z.parentNode === zzzContainer) {
                    zzzContainer.removeChild(z);
                }
            }, animDuration);
        }

        function blink() {
            if (isAsleep) return; 
            
            sloth.classList.add('is-blinking');
            
            setTimeout(() => {
                sloth.classList.remove('is-blinking');
                if (!isAsleep) {
                    blinkTimeout = setTimeout(blink, random(config.blinkInterval.min, config.blinkInterval.max));
                }
            }, config.blinkDuration);
        }

        function wakeUp() {
            isAsleep = false;
            sloth.classList.add('is-awake');
            clearInterval(zzzInterval);
            
            blinkTimeout = setTimeout(blink, random(500, 1500));
            stateTimeout = setTimeout(goToSleep, random(config.awakeDuration.min, config.awakeDuration.max));
        }

        function goToSleep() {
            isAsleep = true;
            sloth.classList.remove('is-awake');
            clearTimeout(blinkTimeout);
            
            zzzInterval = setInterval(spawnZzz, config.zzzInterval);
            spawnZzz();
            
            stateTimeout = setTimeout(wakeUp, random(config.sleepDuration.min, config.sleepDuration.max));
        }

        function init() {
            createFireflies(30);
            
            isAsleep = true;
            zzzInterval = setInterval(spawnZzz, config.zzzInterval);
            spawnZzz(); 
            
            stateTimeout = setTimeout(wakeUp, random(config.sleepDuration.min, config.sleepDuration.max));
        }

        window.onload = init;
        
    </script>
</body>
</html>
